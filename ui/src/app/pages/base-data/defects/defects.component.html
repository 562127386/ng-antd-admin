<nz-card>
  <form nz-form [formGroup]="filterForm" class="filter-form">
    <div nz-row [nzGutter]="16">
      <div nz-col nzSpan="6">
        <nz-form-item>
          <nz-form-label>关键词</nz-form-label>
          <nz-form-control>
            <input nz-input formControlName="filter" placeholder="请输入缺陷编码或名称" />
          </nz-form-control>
        </nz-form-item>
      </div>
      <div nz-col nzSpan="6">
        <nz-form-item>
          <nz-form-label>缺陷分类</nz-form-label>
          <nz-form-control>
            <nz-select formControlName="category" nzPlaceHolder="请选择分类" [nzAllowClear]="true">
              <nz-option *ngFor="let option of categoryOptions" [nzLabel]="option.label" [nzValue]="option.value"></nz-option>
            </nz-select>
          </nz-form-control>
        </nz-form-item>
      </div>
      <div nz-col nzSpan="6">
        <nz-form-item>
          <nz-form-label>严重等级</nz-form-label>
          <nz-form-control>
            <nz-select formControlName="severity" nzPlaceHolder="请选择等级" [nzAllowClear]="true">
              <nz-option *ngFor="let option of severityOptions" [nzLabel]="option.label" [nzValue]="option.value"></nz-option>
            </nz-select>
          </nz-form-control>
        </nz-form-item>
      </div>
      <div nz-col nzSpan="6">
        <nz-form-item>
          <nz-form-label>所属模块</nz-form-label>
          <nz-form-control>
            <nz-select formControlName="module" nzPlaceHolder="请选择模块" [nzAllowClear]="true">
              <nz-option *ngFor="let option of moduleOptions" [nzLabel]="option.label" [nzValue]="option.value"></nz-option>
            </nz-select>
          </nz-form-control>
        </nz-form-item>
      </div>
    </div>
    <div nz-row [nzGutter]="16">
      <div nz-col nzSpan="6">
        <nz-form-item>
          <nz-form-label>状态</nz-form-label>
          <nz-form-control>
            <nz-select formControlName="isEnabled" nzPlaceHolder="请选择状态" [nzAllowClear]="true">
              <nz-option nzLabel="启用" nzValue="true"></nz-option>
              <nz-option nzLabel="禁用" nzValue="false"></nz-option>
            </nz-select>
          </nz-form-control>
        </nz-form-item>
      </div>
      <div nz-col nzSpan="18" class="button-group">
        <button nz-button nzType="primary" (click)="onSearch()">搜索</button>
        <button nz-button (click)="onReset()">重置</button>
      </div>
    </div>
    <div class="add-button">
      <button nz-button nzType="primary" (click)="showAddModal()">
        <span nz-icon nzType="plus"></span>
        新增缺陷
      </button>
    </div>
  </form>
</nz-card>

<nz-card style="margin-top: 16px;">
  <nz-table
    #defectTable
    nzShowSizeChanger
    [nzData]="data"
    [nzLoading]="loading"
    [nzPageIndex]="pageIndex"
    [nzPageSize]="pageSize"
    [nzTotal]="total"
    [nzFrontPagination]="false"
    (nzPageIndexChange)="onPageIndexChange($event)"
    (nzPageSizeChange)="onPageSizeChange($event)"
  >
    <thead>
      <tr>
        <th>缺陷编码</th>
        <th>缺陷名称</th>
        <th>缺陷分类</th>
        <th>严重等级</th>
        <th>所属模块</th>
        <th>状态</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let data of defectTable.data">
        <td>{{ data.code }}</td>
        <td>{{ data.name }}</td>
        <td>{{ getCategoryText(data.category) }}</td>
        <td>
          <nz-tag [nzColor]="getSeverityColor(data.severity)">
            {{ getSeverityText(data.severity) }}
          </nz-tag>
        </td>
        <td>{{ getModuleText(data.module) }}</td>
        <td>
          <nz-switch [ngModel]="data.isEnabled" (ngModelChange)="toggleEnabled(data)"></nz-switch>
        </td>
        <td>
          <nz-space>
            <a (click)="showEditModal(data)">编辑</a>
            <a nz-popconfirm nzPopconfirmTitle="确定删除?" (nzOnConfirm)="showDeleteConfirm(data.id)" nzPopconfirmOkText="确定" nzPopconfirmCancelText="取消">删除</a>
          </nz-space>
        </td>
      </tr>
    </tbody>
  </nz-table>
</nz-card>

<nz-modal
  [(nzVisible)]="isModalVisible"
  nzTitle="{{ isEdit ? '编辑缺陷' : '新增缺陷' }}"
  (nzOnCancel)="handleCancel()"
  (nzOnOk)="handleOk()"
>
  <ng-container *nzModalContent>
    <form nz-form [formGroup]="searchForm">
      <nz-form-item>
        <nz-form-label nzRequired>缺陷编码</nz-form-label>
        <nz-form-control>
          <input nz-input formControlName="code" placeholder="请输入缺陷编码" />
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label nzRequired>缺陷名称</nz-form-label>
        <nz-form-control>
          <input nz-input formControlName="name" placeholder="请输入缺陷名称" />
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label nzRequired>缺陷分类</nz-form-label>
        <nz-form-control>
          <nz-select formControlName="category" nzPlaceHolder="请选择缺陷分类">
            <nz-option *ngFor="let option of categoryOptions" [nzLabel]="option.label" [nzValue]="option.value"></nz-option>
          </nz-select>
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label nzRequired>严重等级</nz-form-label>
        <nz-form-control>
          <nz-select formControlName="severity" nzPlaceHolder="请选择严重等级">
            <nz-option *ngFor="let option of severityOptions" [nzLabel]="option.label" [nzValue]="option.value"></nz-option>
          </nz-select>
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label nzRequired>所属模块</nz-form-label>
        <nz-form-control>
          <nz-select formControlName="module" nzPlaceHolder="请选择所属模块">
            <nz-option *ngFor="let option of moduleOptions" [nzLabel]="option.label" [nzValue]="option.value"></nz-option>
          </nz-select>
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label>备注</nz-form-label>
        <nz-form-control>
          <textarea nz-input formControlName="remark" placeholder="请输入备注" nzAutosize></textarea>
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label>状态</nz-form-label>
        <nz-form-control>
          <nz-switch formControlName="isEnabled" nzCheckedChildren="启用" nzUnCheckedChildren="禁用"></nz-switch>
        </nz-form-control>
      </nz-form-item>
    </form>
  </ng-container>
</nz-modal>
