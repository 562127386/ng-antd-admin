<app-page-header [pageHeaderInfo]="pageHeaderInfo" />

<div class="normal-table-wrap">
  <nz-card class="m-b-10" nzHoverable [nzBodyStyle]="{ 'padding-bottom': 0 }">
    <form nz-form>
      <div nz-row [nzGutter]="{ xs: 8, sm: 16, md: 24 }">
        <div nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
          <nz-form-item>
            <nz-form-label [nzFor]="">关键词</nz-form-label>
            <nz-form-control>
              <input name="filter" nz-input placeholder="请输入编码" [(ngModel)]="filterForm.filter" />
            </nz-form-control>
          </nz-form-item>
        </div>

        <div nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
          <nz-form-item>
            <nz-form-label [nzFor]="">AQL值</nz-form-label>
            <nz-form-control>
              <nz-select name="aqlValue" nzAllowClear nzPlaceHolder="请选择AQL值" [(ngModel)]="filterForm.aqlValue">
                <nz-option nzLabel="0.010" [nzValue]="0.010"></nz-option>
                <nz-option nzLabel="0.015" [nzValue]="0.015"></nz-option>
                <nz-option nzLabel="0.025" [nzValue]="0.025"></nz-option>
                <nz-option nzLabel="0.040" [nzValue]="0.040"></nz-option>
                <nz-option nzLabel="0.065" [nzValue]="0.065"></nz-option>
                <nz-option nzLabel="0.10" [nzValue]="0.10"></nz-option>
                <nz-option nzLabel="0.15" [nzValue]="0.15"></nz-option>
                <nz-option nzLabel="0.25" [nzValue]="0.25"></nz-option>
                <nz-option nzLabel="0.40" [nzValue]="0.40"></nz-option>
                <nz-option nzLabel="0.65" [nzValue]="0.65"></nz-option>
                <nz-option nzLabel="1.0" [nzValue]="1.0"></nz-option>
                <nz-option nzLabel="1.5" [nzValue]="1.5"></nz-option>
                <nz-option nzLabel="2.5" [nzValue]="2.5"></nz-option>
                <nz-option nzLabel="4.0" [nzValue]="4.0"></nz-option>
                <nz-option nzLabel="6.5" [nzValue]="6.5"></nz-option>
                <nz-option nzLabel="10" [nzValue]="10"></nz-option>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>

        <div nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
          <nz-form-item>
            <nz-form-label [nzFor]="">检验水平</nz-form-label>
            <nz-form-control>
              <nz-select name="inspectionLevel" nzAllowClear nzPlaceHolder="请选择检验水平" [(ngModel)]="filterForm.inspectionLevel">
                <nz-option *ngFor="let option of inspectionLevelOptions" [nzLabel]="option.label" [nzValue]="option.value"></nz-option>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>

        <div nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
          <nz-form-item>
            <nz-form-label [nzFor]="">抽样方案</nz-form-label>
            <nz-form-control>
              <nz-select name="samplingSchemeId" nzAllowClear nzPlaceHolder="请选择抽样方案" [(ngModel)]="filterForm.samplingSchemeId">
                <nz-option *ngFor="let scheme of samplingSchemes" [nzLabel]="scheme.name" [nzValue]="scheme.id"></nz-option>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>

        <div nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
          <nz-form-item>
            <nz-form-label [nzFor]="">样本量</nz-form-label>
            <nz-form-control>
              <div nz-row [nzGutter]="8">
                <div nz-col [nzSpan]="11">
                  <nz-input-number name="minSampleSize" [(ngModel)]="filterForm.minSampleSize" [nzMin]="0" [nzStep]="1" nzPlaceHolder="最小" style="width: 100%;"></nz-input-number>
                </div>
                <div nz-col [nzSpan]="2" style="text-align: center;">-</div>
                <div nz-col [nzSpan]="11">
                  <nz-input-number name="maxSampleSize" [(ngModel)]="filterForm.maxSampleSize" [nzMin]="0" [nzStep]="1" nzPlaceHolder="最大" style="width: 100%;"></nz-input-number>
                </div>
              </div>
            </nz-form-control>
          </nz-form-item>
        </div>

        <div nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
          <nz-form-item>
            <nz-form-label [nzFor]="">批量</nz-form-label>
            <nz-form-control>
              <nz-input-number name="lotSize" [(ngModel)]="filterForm.lotSize" [nzMin]="0" [nzStep]="1" nzPlaceHolder="请输入批量" style="width: 100%;"></nz-input-number>
            </nz-form-control>
          </nz-form-item>
        </div>

        <div nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
          <nz-form-item>
            <nz-form-label [nzFor]="">状态</nz-form-label>
            <nz-form-control>
              <nz-select name="isEnabled" nzAllowClear nzPlaceHolder="请选择状态" [(ngModel)]="filterForm.isEnabled">
                <nz-option nzLabel="启用" [nzValue]="true"></nz-option>
                <nz-option nzLabel="禁用" [nzValue]="false"></nz-option>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>

        <div class="text-right p-0 m-b-10" nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
          <button nz-button [nzType]="'primary'" (click)="getDataList({ pageIndex: 1 })">
            <i nz-icon nzType="search"></i>
            搜索
          </button>
          <button class="m-l-15" nz-button (click)="resetForm()">
            <i nz-icon nzTheme="outline" nzType="close-circle"></i>
            重置
          </button>
        </div>
      </div>
    </form>
  </nz-card>

  <app-card-table-wrap [btnTpl]="tableBtns" [tableTitle]="'AQL配置列表'" (reload)="reloadTable()">
    <app-ant-table
      [checkedCashArrayFromComment]="checkedCashArray"
      [tableConfig]="tableConfig"
      [tableData]="dataList"
      (changePageIndex)="getDataList($event)"
      (changePageSize)="changePageSize($event)"
      (selectedChange)="selectedChecked($event)"
    ></app-ant-table>
    <ng-template #operationTpl let-$$dataItem="$$dataItem" let-id="id">
      <span class="operate-text" (click)="edit(id, $$dataItem)">编辑</span>
      <span class="operate-text" (click)="del(id)">删除</span>
    </ng-template>
    <ng-template #inspectionLevelTpl let-$$dataItem="$$dataItem">
      {{ getInspectionLevelName($$dataItem.inspectionLevel) }}
    </ng-template>
  </app-card-table-wrap>

  <ng-template #tableBtns>
    <button class="m-r-8" nz-button nzType="primary" (click)="add()">
      <i nz-icon nzType="plus"></i>
      新建
    </button>
  </ng-template>
</div>

<nz-modal
  [(nzVisible)]="isModalVisible"
  nzTitle="{{ isEdit ? '编辑AQL配置' : '新增AQL配置' }}"
  (nzOnCancel)="handleCancel()"
  (nzOnOk)="handleOk()"
>
  <ng-container *nzModalContent>
    <nz-form-item>
      <nz-form-label nzRequired>AQL编码</nz-form-label>
      <nz-form-control>
        <input nz-input placeholder="请输入AQL编码" [(ngModel)]="searchFormData.code" />
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label>AQL值</nz-form-label>
      <nz-form-control>
        <nz-input-number [(ngModel)]="searchFormData.aqlValue" [nzMin]="0" [nzStep]="0.1"></nz-input-number>
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label nzRequired>检验水平</nz-form-label>
      <nz-form-control>
        <nz-select [(ngModel)]="searchFormData.inspectionLevel" nzPlaceHolder="请选择检验水平">
          <nz-option *ngFor="let option of inspectionLevelOptions" [nzLabel]="option.label" [nzValue]="option.value"></nz-option>
        </nz-select>
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label>最小批量</nz-form-label>
      <nz-form-control>
        <nz-input-number [(ngModel)]="searchFormData.minLotSize" [nzMin]="0" [nzStep]="1"></nz-input-number>
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label>最大批量</nz-form-label>
      <nz-form-control>
        <nz-input-number [(ngModel)]="searchFormData.maxLotSize" [nzMin]="0" [nzStep]="1"></nz-input-number>
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label>样本量字码</nz-form-label>
      <nz-form-control>
        <input nz-input placeholder="请输入样本量字码" [(ngModel)]="searchFormData.sampleSizeCode" />
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label>样本量</nz-form-label>
      <nz-form-control>
        <nz-input-number [(ngModel)]="searchFormData.sampleSize" [nzMin]="0" [nzStep]="1"></nz-input-number>
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label>Ac</nz-form-label>
      <nz-form-control>
        <nz-input-number [(ngModel)]="searchFormData.acceptanceNumber" [nzMin]="0" [nzStep]="1"></nz-input-number>
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label>Re</nz-form-label>
      <nz-form-control>
        <nz-input-number [(ngModel)]="searchFormData.rejectionNumber" [nzMin]="0" [nzStep]="1"></nz-input-number>
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label>备注</nz-form-label>
      <nz-form-control>
        <textarea nz-input placeholder="请输入备注" [(ngModel)]="searchFormData.remark"></textarea>
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label>状态</nz-form-label>
      <nz-form-control>
        <nz-switch [(ngModel)]="searchFormData.isEnabled" nzCheckedChildren="启用" nzUnCheckedChildren="禁用"></nz-switch>
      </nz-form-control>
    </nz-form-item>
  </ng-container>
</nz-modal>
