<app-page-header [pageHeaderInfo]="pageHeaderInfo" />

<div class="normal-table-wrap">
  <nz-card class="m-b-10" nzHoverable [nzBodyStyle]="{ 'padding-bottom': 0 }">
    <form nz-form>
      <div nz-row [nzGutter]="{ xs: 8, sm: 16, md: 24 }">
        <div nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
          <nz-form-item>
            <nz-form-label [nzFor]="">关键词</nz-form-label>
            <nz-form-control>
              <input name="filter" nz-input placeholder="请输入编码或名称" [(ngModel)]="filterForm.filter" />
            </nz-form-control>
          </nz-form-item>
        </div>

        <div nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
          <nz-form-item>
            <nz-form-label [nzFor]="">抽样类型</nz-form-label>
            <nz-form-control>
              <nz-select name="schemeType" nzAllowClear nzPlaceHolder="请选择抽样类型" [(ngModel)]="filterForm.schemeType">
                @for (option of schemeTypeOptions; track option) {
                  <nz-option [nzLabel]="option.label" [nzValue]="option.value"></nz-option>
                }
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>

        <div class="text-right p-0 m-b-10" nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
          <button nz-button [nzType]="'primary'" (click)="getDataList({ pageIndex: 1 })">
            <i nz-icon nzType="search"></i>
            搜索
          </button>
          <button class="m-l-15" nz-button (click)="resetForm()">
            <i nz-icon nzTheme="outline" nzType="close-circle"></i>
            重置
          </button>
        </div>
      </div>
    </form>
  </nz-card>

  <app-card-table-wrap [btnTpl]="tableBtns" [tableTitle]="'抽样方案列表'" (reload)="reloadTable()">
    <app-ant-table
      [checkedCashArrayFromComment]="checkedCashArray"
      [tableConfig]="tableConfig"
      [tableData]="dataList"
      (changePageIndex)="getDataList($event)"
      (changePageSize)="changePageSize($event)"
      (selectedChange)="selectedChecked($event)"
    ></app-ant-table>
    <ng-template #operationTpl let-$$dataItem="$$dataItem" let-id="id">
      <span class="operate-text" (click)="edit(id, $$dataItem)">编辑</span>
      <span class="operate-text" (click)="del(id)">删除</span>
    </ng-template>
  </app-card-table-wrap>

  <ng-template #tableBtns>
    <button class="m-r-8" nz-button nzType="primary" (click)="add()">
      <i nz-icon nzType="plus"></i>
      新建
    </button>
  </ng-template>
</div>

<nz-modal
  [(nzVisible)]="isModalVisible"
  nzTitle="{{ isEdit ? '编辑抽样方案' : '新增抽样方案' }}"
  (nzOnCancel)="handleCancel()"
  (nzOnOk)="handleOk()"
  nzWidth="800px"
>
  <ng-container *nzModalContent>
    <form nz-form [formGroup]="modalForm" nzLayout="vertical">
      <div nz-row [nzGutter]="16">
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzRequired>方案编码</nz-form-label>
            <nz-form-control [nzErrorTip]="getCodeErrorTip">
              <input nz-input formControlName="code" placeholder="请输入方案编码" />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzRequired>方案名称</nz-form-label>
            <nz-form-control [nzErrorTip]="getNameErrorTip">
              <input nz-input formControlName="name" placeholder="请输入方案名称" />
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>
      <div nz-row [nzGutter]="16">
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzRequired>抽样类型</nz-form-label>
            <nz-form-control>
              <nz-select formControlName="schemeType" nzPlaceHolder="请选择抽样类型">
                @for (option of schemeTypeOptions; track option) {
                  <nz-option [nzLabel]="option.label" [nzValue]="option.value"></nz-option>
                }
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label>排序</nz-form-label>
            <nz-form-control>
              <nz-input-number formControlName="sortOrder" [nzMin]="0" [nzStep]="1" style="width: 100%"></nz-input-number>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>
      <div nz-row [nzGutter]="16">
        <div nz-col [nzSpan]="24">
          <nz-form-item>
            <nz-form-label>描述</nz-form-label>
            <nz-form-control>
              <textarea nz-input formControlName="description" placeholder="请输入描述" [nzAutosize]="{ minRows: 2, maxRows: 4 }"></textarea>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>

      <nz-divider nzText="AQL抽样配置" *ngIf="showAqlConfig"></nz-divider>
      <ng-container *ngIf="showAqlConfig">
        <div nz-row [nzGutter]="16">
          <div nz-col [nzSpan]="12">
            <nz-form-item>
              <nz-form-label>AQL配置</nz-form-label>
              <nz-form-control>
                <nz-select formControlName="aqlConfigId" nzAllowClear nzPlaceHolder="请选择AQL配置" style="width: 100%;">
                  @for (option of aqlConfigOptions; track option) {
                    <nz-option [nzLabel]="option.code + ' - AQL:' + option.aqlValue + ' - ' + getInspectionLevelText(option.inspectionLevel)" [nzValue]="option.id"></nz-option>
                  }
                </nz-select>
              </nz-form-control>
            </nz-form-item>
          </div>
        </div>
      </ng-container>

      <nz-divider nzText="C=0抽样配置" *ngIf="showCZeroConfig"></nz-divider>
      <ng-container *ngIf="showCZeroConfig">
        <div nz-row [nzGutter]="16">
          <div nz-col [nzSpan]="12">
            <nz-form-item>
              <nz-form-label>固定样本量</nz-form-label>
              <nz-form-control>
                <nz-input-number formControlName="fixedSampleSize" [nzMin]="0" nzPlaceHolder="请输入固定样本量" style="width: 100%;"></nz-input-number>
              </nz-form-control>
            </nz-form-item>
          </div>
        </div>
        <div nz-row [nzGutter]="16">
          <div nz-col [nzSpan]="12">
            <nz-form-item>
              <nz-form-label nzRequired>接收数(Ac)</nz-form-label>
              <nz-form-control [nzErrorTip]="getC0ValidationMessage('acceptanceNumber')">
                <nz-input-number formControlName="acceptanceNumber" [nzMin]="0" nzPlaceHolder="请输入接收数" style="width: 100%;"></nz-input-number>
              </nz-form-control>
            </nz-form-item>
          </div>
          <div nz-col [nzSpan]="12">
            <nz-form-item>
              <nz-form-label nzRequired>拒收数(Re)</nz-form-label>
              <nz-form-control [nzErrorTip]="getC0ValidationMessage('rejectionNumber')">
                <nz-input-number formControlName="rejectionNumber" [nzMin]="0" nzPlaceHolder="请输入拒收数" style="width: 100%;"></nz-input-number>
              </nz-form-control>
            </nz-form-item>
          </div>
        </div>
      </ng-container>

      <nz-divider nzText="计量抽样配置" *ngIf="showVariableConfig"></nz-divider>
      <ng-container *ngIf="showVariableConfig">
        <div nz-row [nzGutter]="16">
          <div nz-col [nzSpan]="12">
            <nz-form-item>
              <nz-form-label>固定样本量</nz-form-label>
              <nz-form-control>
                <nz-input-number formControlName="fixedSampleSize" [nzMin]="0" nzPlaceHolder="请输入固定样本量" style="width: 100%;"></nz-input-number>
              </nz-form-control>
            </nz-form-item>
          </div>
        </div>
      </ng-container>

      <nz-divider nzText="连续抽样配置" *ngIf="showContinuousConfig"></nz-divider>
      <ng-container *ngIf="showContinuousConfig">
        <div nz-row [nzGutter]="16">
          <div nz-col [nzSpan]="12">
            <nz-form-item>
              <nz-form-label>抽样百分比(%)</nz-form-label>
              <nz-form-control>
                <nz-input-number formControlName="samplePercentage" [nzMin]="0" [nzMax]="100" nzPlaceHolder="请输入抽样百分比" style="width: 100%;"></nz-input-number>
              </nz-form-control>
            </nz-form-item>
          </div>
        </div>
      </ng-container>

      <div nz-row [nzGutter]="16">
        <div nz-col [nzSpan]="24">
          <nz-form-item>
            <nz-form-label>状态</nz-form-label>
            <nz-form-control>
              <nz-switch formControlName="isEnabled" nzCheckedChildren="启用" nzUnCheckedChildren="禁用"></nz-switch>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>
    </form>
  </ng-container>
</nz-modal>
