<nz-card>
  <form nz-form [formGroup]="filterForm" class="filter-form">
    <div nz-row [nzGutter]="16">
      <div nz-col nzSpan="8">
        <nz-form-item>
          <nz-form-label>关键词</nz-form-label>
          <nz-form-control>
            <input nz-input formControlName="filter" placeholder="请输入工序编码或名称" />
          </nz-form-control>
        </nz-form-item>
      </div>
      <div nz-col nzSpan="8">
        <nz-form-item>
          <nz-form-label>状态</nz-form-label>
          <nz-form-control>
            <nz-select formControlName="isEnabled" nzPlaceHolder="请选择状态" [nzAllowClear]="true">
              <nz-option nzLabel="启用" nzValue="true"></nz-option>
              <nz-option nzLabel="禁用" nzValue="false"></nz-option>
            </nz-select>
          </nz-form-control>
        </nz-form-item>
      </div>
      <div nz-col nzSpan="8" class="button-group">
        <button nz-button nzType="primary" (click)="onSearch()">搜索</button>
        <button nz-button (click)="onReset()">重置</button>
      </div>
    </div>
    <div class="add-button">
      <button nz-button nzType="primary" (click)="showAddModal()">
        <span nz-icon nzType="plus"></span>
        新增工序
      </button>
    </div>
  </form>
</nz-card>

<nz-card style="margin-top: 16px;">
  <nz-table
    #processTable
    nzShowSizeChanger
    [nzData]="data"
    [nzLoading]="loading"
    [nzPageIndex]="pageIndex"
    [nzPageSize]="pageSize"
    [nzTotal]="total"
    [nzFrontPagination]="false"
    (nzPageIndexChange)="onPageIndexChange($event)"
    (nzPageSizeChange)="onPageSizeChange($event)"
  >
    <thead>
      <tr>
        <th>工序编码</th>
        <th>工序名称</th>
        <th>所属车间</th>
        <th>状态</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let data of processTable.data">
        <td>{{ data.code }}</td>
        <td>{{ data.name }}</td>
        <td>{{ data.workshop }}</td>
        <td>
          <nz-tag [nzColor]="data.isEnabled ? 'green' : 'red'">
            {{ data.isEnabled ? '启用' : '禁用' }}
          </nz-tag>
        </td>
        <td>
          <nz-space>
            <a (click)="showEditModal(data)">编辑</a>
            <a nz-popconfirm nzPopconfirmTitle="确定删除?" (nzOnConfirm)="showDeleteConfirm(data.id)" nzPopconfirmOkText="确定" nzPopconfirmCancelText="取消">删除</a>
          </nz-space>
        </td>
      </tr>
    </tbody>
  </nz-table>
</nz-card>

<nz-modal
  [(nzVisible)]="isModalVisible"
  nzTitle="{{ isEdit ? '编辑工序' : '新增工序' }}"
  (nzOnCancel)="handleCancel()"
  (nzOnOk)="handleOk()"
>
  <ng-container *nzModalContent>
    <form nz-form [formGroup]="searchForm">
      <nz-form-item>
        <nz-form-label nzRequired>工序编码</nz-form-label>
        <nz-form-control>
          <input nz-input formControlName="code" placeholder="请输入工序编码" />
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label nzRequired>工序名称</nz-form-label>
        <nz-form-control>
          <input nz-input formControlName="name" placeholder="请输入工序名称" />
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label nzRequired>所属车间</nz-form-label>
        <nz-form-control>
          <input nz-input formControlName="workshop" placeholder="请输入所属车间" />
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label>描述</nz-form-label>
        <nz-form-control>
          <textarea nz-input formControlName="description" placeholder="请输入描述" nzAutosize></textarea>
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label>状态</nz-form-label>
        <nz-form-control>
          <nz-switch formControlName="isEnabled" nzCheckedChildren="启用" nzUnCheckedChildren="禁用"></nz-switch>
        </nz-form-control>
      </nz-form-item>
    </form>
  </ng-container>
</nz-modal>
