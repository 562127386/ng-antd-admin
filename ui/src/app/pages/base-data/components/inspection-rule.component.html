<div class="inspection-rule-container">
  <nz-card>
    <div class="card-header">
      <h3>判定规则配置</h3>
      <button nz-button nzType="primary" (click)="showAddModal()">
        <i nz-icon nzType="plus"></i>
        添加规则
      </button>
    </div>
    
    <nz-divider></nz-divider>
    
    <div class="rule-list">
      <nz-table 
        [nzData]="inspectionRules" 
        [nzLoading]="loading"
        [nzSize]="'middle'"
      >
        <thead>
          <tr>
            <th nzWidth="120px">规则名称</th>
            <th nzWidth="100px">严重等级</th>
            <th nzWidth="80px">优先级</th>
            <th nzWidth="150px">条件表达式</th>
            <th nzWidth="120px">判定结果</th>
            <th nzWidth="150px">说明</th>
            <th nzWidth="150px">执行动作</th>
            <th nzWidth="100px">备注</th>
            <th nzWidth="120px">操作</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let rule of inspectionRules; trackBy: trackByRuleId">
            <td>{{ rule.name }}</td>
            <td>
              <nz-tag [nzColor]="getSeverityColor(rule.severityLevel)">
                {{ rule.severityLevel }}
              </nz-tag>
            </td>
            <td>{{ rule.priority }}</td>
            <td>{{ rule.conditionExpression }}</td>
            <td>{{ rule.judgmentResult }}</td>
            <td>{{ rule.description }}</td>
            <td>{{ rule.executeAction }}</td>
            <td>{{ rule.remark || '-' }}</td>
            <td>
              <nz-space size="small">
                <button nz-button nzType="text" nzSize="small" (click)="showEditModal(rule)">
                  <i nz-icon nzType="edit"></i>
                  编辑
                </button>
                <button nz-button nzType="text" nzSize="small" nz-popconfirm nzTitle="确定删除此判定规则吗？" (nzOnConfirm)="deleteRule(rule.id)">
                  <i nz-icon nzType="delete" nzTheme="fill" style="color: #ff4d4f;"></i>
                  删除
                </button>
              </nz-space>
            </td>
          </tr>
        </tbody>
      </nz-table>
    </div>
  </nz-card>

  <!-- 判定规则模态框 -->
  <nz-modal
    [(nzVisible)]="isModalVisible"
    nzTitle="{{ currentRule ? '编辑判定规则' : '添加判定规则' }}"
    nzWidth="800px"
    (nzOnCancel)="handleModalCancel()"
    (nzOnOk)="handleModalOk()"
  >
    <ng-container *nzModalContent>
      <form nz-form [formGroup]="ruleForm" class="rule-form">
        <div nz-row [nzGutter]="24">
          <div nz-col [nzSpan]="12">
            <nz-form-item>
              <nz-form-label nzRequired>规则名称</nz-form-label>
              <nz-form-control>
                <input nz-input formControlName="name" placeholder="请输入规则名称" />
              </nz-form-control>
            </nz-form-item>
          </div>
          <div nz-col [nzSpan]="12">
            <nz-form-item>
              <nz-form-label nzRequired>严重等级</nz-form-label>
              <nz-form-control>
                <nz-select formControlName="severityLevel" placeholder="请选择严重等级">
                  <nz-option 
                    *ngFor="let level of severityLevels" 
                    [nzLabel]="level.label" 
                    [nzValue]="level.value"
                  ></nz-option>
                </nz-select>
              </nz-form-control>
            </nz-form-item>
          </div>
        </div>
        
        <div nz-row [nzGutter]="24">
          <div nz-col [nzSpan]="12">
            <nz-form-item>
              <nz-form-label nzRequired>优先级</nz-form-label>
              <nz-form-control>
                <input nz-input type="number" formControlName="priority" placeholder="请输入优先级" />
              </nz-form-control>
            </nz-form-item>
          </div>
          <div nz-col [nzSpan]="12">
            <nz-form-item>
              <nz-form-label nzRequired>判定结果</nz-form-label>
              <nz-form-control>
                <input nz-input formControlName="judgmentResult" placeholder="请输入判定结果" />
              </nz-form-control>
            </nz-form-item>
          </div>
        </div>
        
        <div nz-row [nzGutter]="24">
          <div nz-col [nzSpan]="24">
            <nz-form-item>
              <nz-form-label nzRequired>条件表达式</nz-form-label>
              <nz-form-control>
                <input nz-input formControlName="conditionExpression" placeholder="请输入条件表达式，如：value > 10" />
              </nz-form-control>
            </nz-form-item>
          </div>
        </div>
        
        <div nz-row [nzGutter]="24">
          <div nz-col [nzSpan]="24">
            <nz-form-item>
              <nz-form-label nzRequired>说明</nz-form-label>
              <nz-form-control>
                <input nz-input formControlName="description" placeholder="请输入规则说明" />
              </nz-form-control>
            </nz-form-item>
          </div>
        </div>
        
        <div nz-row [nzGutter]="24">
          <div nz-col [nzSpan]="24">
            <nz-form-item>
              <nz-form-label nzRequired>执行动作</nz-form-label>
              <nz-form-control>
                <input nz-input formControlName="executeAction" placeholder="请输入执行动作" />
              </nz-form-control>
            </nz-form-item>
          </div>
        </div>
        
        <div nz-row [nzGutter]="24">
          <div nz-col [nzSpan]="24">
            <nz-form-item>
              <nz-form-label>备注</nz-form-label>
              <nz-form-control>
                <input nz-input formControlName="remark" placeholder="请输入备注" />
              </nz-form-control>
            </nz-form-item>
          </div>
        </div>
      </form>
    </ng-container>
  </nz-modal>
</div>
