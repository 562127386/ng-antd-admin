<div class="quality-indicator-selector">
  <form nz-form [formGroup]="searchForm" class="search-form">
    <div nz-row [nzGutter]="16">
      <div nz-col nzSpan="6">
        <nz-form-item>
          <nz-form-label>编码</nz-form-label>
          <nz-form-control>
            <input nz-input formControlName="code" placeholder="请输入指标编码" />
          </nz-form-control>
        </nz-form-item>
      </div>
      <div nz-col nzSpan="6">
        <nz-form-item>
          <nz-form-label>名称</nz-form-label>
          <nz-form-control>
            <input nz-input formControlName="name" placeholder="请输入指标名称" />
          </nz-form-control>
        </nz-form-item>
      </div>
      <div nz-col nzSpan="6">
        <nz-form-item>
          <nz-form-label>指标类别</nz-form-label>
          <nz-form-control>
            <input nz-input formControlName="indicatorCategory" placeholder="请输入指标类别" />
          </nz-form-control>
        </nz-form-item>
      </div>
      <div nz-col nzSpan="6">
        <nz-form-item>
          <nz-form-label>检验类型</nz-form-label>
          <nz-form-control>
            <input nz-input formControlName="inspectionType" placeholder="请输入检验类型" />
          </nz-form-control>
        </nz-form-item>
      </div>
    </div>
    <div nz-row [nzGutter]="16">
      <div nz-col nzSpan="24" class="button-group">
        <button nz-button nzType="primary" (click)="onSearch()">搜索</button>
        <button nz-button (click)="onReset()">重置</button>
      </div>
    </div>
  </form>
  
  <nz-table 
    #indicatorsTable 
    [nzData]="filteredIndicators" 
    nzSize="small"
    [nzLoading]="loading"
    nzShowPagination
  >
    <thead>
      <tr>
        <th nzWidth="60px">
          <label nz-checkbox [nzChecked]="allChecked" [nzIndeterminate]="indeterminate" (nzCheckedChange)="onAllCheckedChange($event)"></label>
        </th>
        <th nzWidth="120px">编码</th>
        <th nzWidth="150px">指标类别</th>
        <th nzWidth="150px">名称</th>
        <th nzWidth="100px">检验类型</th>
        <th nzWidth="100px">破坏性</th>
        <th nzWidth="100px">单位</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of indicatorsTable.data">
        <td>
          <label nz-checkbox [nzChecked]="selectedIndicators.has(item.id)" (nzCheckedChange)="onItemCheckedChange(item.id, $event)"></label>
        </td>
        <td>{{ item.code }}</td>
        <td>{{ item.indicatorCategory }}</td>
        <td>{{ item.name }}</td>
        <td>{{ item.inspectionType }}</td>
        <td>{{ item.isCritical ? '是' : '否' }}</td>
        <td>{{ item.unit }}</td>
      </tr>
    </tbody>
  </nz-table>
  
  <div class="modal-footer">
    <button nz-button (click)="cancel()">取消</button>
    <button nz-button nzType="primary" (click)="confirm()">确定</button>
  </div>
</div>
