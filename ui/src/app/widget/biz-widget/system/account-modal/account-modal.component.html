<form nz-form [formGroup]="addEditForm">
  <nz-form-item>
    <nz-form-label nzFor="userName" nzRequired [nzSm]="4" [nzXs]="24">用户名</nz-form-label>
    <nz-form-control [nzErrorTip]="combineTpl" [nzSm]="18" [nzXs]="24">
      <input id="userName" formControlName="userName" nz-input placeholder="用户名" />
    </nz-form-control>
  </nz-form-item>
  @if (!isEdit) {
    <nz-form-item>
      <nz-form-label nzFor="password" nzRequired [nzSm]="4" [nzXs]="24">密码</nz-form-label>
      <nz-form-control nzExtra="新建用户初始密码为：a123456" [nzErrorTip]="combineTpl" [nzSm]="18" [nzXs]="24">
        <input formControlName="password" nz-input placeholder="密码" [type]="'password'" />
      </nz-form-control>
    </nz-form-item>
  }
  <nz-form-item>
    <nz-form-label nzFor="name" nzRequired [nzSm]="4" [nzXs]="24">姓名</nz-form-label>
    <nz-form-control [nzErrorTip]="combineTpl" [nzSm]="18" [nzXs]="24">
      <input id="name" formControlName="name" nz-input placeholder="姓名" />
    </nz-form-control>
  </nz-form-item>
  <nz-form-item>
    <nz-form-label nzFor="surname" [nzSm]="4" [nzXs]="24">姓氏</nz-form-label>
    <nz-form-control [nzErrorTip]="combineTpl" [nzSm]="18" [nzXs]="24">
      <input id="surname" formControlName="surname" nz-input placeholder="姓氏" />
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label nzFor="isActive" nzRequired [nzSm]="4" [nzXs]="24">状态</nz-form-label>
    <nz-form-control [nzErrorTip]="combineTpl" [nzSm]="18" [nzXs]="24">
      <nz-switch formControlName="isActive" nzCheckedChildren="可用" nzUnCheckedChildren="禁用"></nz-switch>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label nzFor="phoneNumber" nzRequired [nzSm]="4" [nzXs]="24">手机号</nz-form-label>
    <nz-form-control [nzErrorTip]="combineTpl" [nzSm]="18" [nzXs]="24">
      <input id="phoneNumber" formControlName="phoneNumber" maxlength="11" nz-input placeholder="手机号" />
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label nzFor="email" nzRequired [nzSm]="4" [nzXs]="24">电子邮箱</nz-form-label>
    <nz-form-control [nzErrorTip]="combineTpl" [nzSm]="18" [nzXs]="24">
      <input id="email" formControlName="email" nz-input placeholder="电子邮箱" />
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label nzFor="departmentId" nzRequired [nzSm]="4" [nzXs]="24">所属部门</nz-form-label>
    <nz-form-control [nzErrorTip]="combineTpl" [nzSm]="18" [nzXs]="24">
      <nz-tree-select formControlName="departmentId" nzPlaceHolder="Please select" nzShowSearch [nzDropdownMatchSelectWidth]="true" [nzNodes]="deptNodes"></nz-tree-select>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label nzFor="roleId" nzRequired [nzSm]="4" [nzXs]="24">用户角色</nz-form-label>
    <nz-form-control [nzErrorTip]="combineTpl" [nzSm]="18" [nzXs]="24">
      <nz-select formControlName="roleId" nzMode="multiple" nzPlaceHolder="角色">
        @for (option of roleOptions; track option) {
          <nz-option [nzLabel]="option.label" [nzValue]="option.value"></nz-option>
        }
      </nz-select>
    </nz-form-control>
  </nz-form-item>
</form>
<ng-template #combineTpl let-control>
  @if (control.hasError('message')) {
    {{ control.errors.message }}
  }
  @if (control.hasError('required')) {
    必填项
  }
</ng-template>
