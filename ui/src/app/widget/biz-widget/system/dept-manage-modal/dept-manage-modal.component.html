<form nz-form [formGroup]="addEditForm">
  <nz-form-item>
    <nz-form-label nzFor="displayName" nzRequired [nzSm]="6" [nzXs]="24">部门名称</nz-form-label>
    <nz-form-control [nzErrorTip]="combineTpl" [nzSm]="14" [nzXs]="24">
      <input id="displayName" name="displayName" formControlName="displayName" nz-input placeholder="请输入部门名称" />
    </nz-form-control>
  </nz-form-item>
  
  <nz-form-item>
    <nz-form-label nzFor="code" [nzSm]="6" [nzXs]="24">部门编码</nz-form-label>
    <nz-form-control [nzErrorTip]="combineTpl" [nzSm]="14" [nzXs]="24">
      <input id="code" name="code" formControlName="code" nz-input placeholder="请输入部门编码" />
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label nzFor="isActive" nzRequired [nzSm]="6" [nzXs]="24">部门状态</nz-form-label>
    <nz-form-control [nzErrorTip]="combineTpl" [nzSm]="14" [nzXs]="24">
      <nz-radio-group formControlName="isActive">
        <label nz-radio [nzValue]="false">禁用</label>
        <label nz-radio [nzValue]="true">可用</label>
      </nz-radio-group>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label nzFor="order" nzRequired [nzSm]="6" [nzXs]="24">排序</nz-form-label>
    <nz-form-control [nzErrorTip]="combineTpl" [nzSm]="14" [nzXs]="24">
      <nz-input-number id="order" formControlName="order" nzMin="0" nzPlaceHolder="排序" nzStep="1" />
    </nz-form-control>
  </nz-form-item>
</form>

<ng-template #combineTpl let-control>
  @if (control.hasError('message')) {
    {{ control.errors.message }}
  }
  @if (control.hasError('required')) {
    必填项
  }
</ng-template>
